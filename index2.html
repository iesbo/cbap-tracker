<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBAP Deneyim Skoru Takip Paneli</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDK (Compat Version for simple global scripts) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
        }

        .modal-enter {
            animation: modalFadeIn 0.3s ease-out forwards;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .progress-bar {
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase Configuration & Initialization
        const firebaseConfig = {
            apiKey: "AIzaSyAXvDtKEGQfJj0PkozqW45aY-SeVPlnqYw",
            authDomain: "cbap-experience-tracker.firebaseapp.com",
            projectId: "cbap-experience-tracker",
            storageBucket: "cbap-experience-tracker.firebasestorage.app",
            messagingSenderId: "847116052236",
            appId: "1:847116052236:web:fb77da0f44aff5a4cf4b29"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Custom Icon Components to replace lucide-react (since we are in HTML)
        const IconTrophy = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-amber-500"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" /><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" /><path d="M4 22h16" /><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" /><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" /><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" /></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><path d="M8 12h8" /><path d="M12 8v8" /></svg>;
        const IconCheckCircle = ({ size = 40, className = "text-emerald-500" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></svg>;
        const IconTarget = ({ size = 40, className = "text-slate-400" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></svg>;
        const IconBarChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-indigo-600"><path d="M3 3v18h18" /><path d="M18 17V9" /><path d="M13 17V5" /><path d="M8 17v-3" /></svg>;
        const IconAlert = ({ size = 24, className = "text-amber-500" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></svg>;
        const IconInfo = ({ className = "text-amber-600" }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></svg>;
        const IconFileText = ({ size = 28, className = "text-indigo-600" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><line x1="10" y1="9" x2="8" y2="9" /></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></svg>;
        const IconChevronDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9" /></svg>;
        const IconWand = ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 4V2" /><path d="M15 16v-2" /><path d="M8 9h2" /><path d="M20 9h2" /><path d="M17.8 11.8l1.4 1.4" /><path d="M15 9h0" /><path d="M17.8 6.2l1.4-1.4" /><path d="M3 21l9-9" /><path d="M12.2 6.2l-1.4-1.4" /></svg>;
        const IconLoader = ({ className = "w-5 h-5 animate-spin" }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56" /></svg>;

        const KNOWLEDGE_AREAS = [
            { id: 'bapm', name: 'BA Planning & Monitoring', color: 'bg-blue-500' },
            { id: 'ec', name: 'Elicitation & Collaboration', color: 'bg-emerald-500' },
            { id: 'rlcm', name: 'Requirements Life Cycle Mgmt', color: 'bg-amber-500' },
            { id: 'sa', name: 'Strategy Analysis', color: 'bg-purple-500' },
            { id: 'radd', name: 'Req. Analysis & Design Def.', color: 'bg-rose-500' },
            { id: 'se', name: 'Solution Evaluation', color: 'bg-indigo-500' }
        ];

        // Örnek Proje ile başlatıyoruz
        const INITIAL_PROJECT = {
            id: 1,
            title: 'Şube Hesap Açılış Ücreti Geliştirmesi',
            startDate: '2023-01',
            endDate: '2023-02',
            totalHours: 150,
            hoursByKA: { bapm: 0, ec: 60, rlcm: 20, sa: 0, radd: 40, se: 30 },
            description: 'Facilitated elicitation sessions with Pricing and Commission technical teams to specify technical requirements for the Branch Account Opening Fee initiative. Documented and communicated business analysis information to cross-functional stakeholders. Managed requirements traceability throughout the development lifecycle to ensure alignment with business objectives. Conducted solution validation in the UAT environment to verify that the design met stakeholder requirements. Managed stakeholder collaboration by preparing organization-wide communications and providing post-implementation support to evaluate solution performance and address business inquiries.',
            mentorFeedback: [
                'Birim testi (Unit Test) gibi ifadeler IIBA standartlarına göre çözüm doğrulaması (Solution Validation) olarak revize edilmiştir.',
                'Kod paketi çıkışı doğrudan proje yönetimi algılanmaması için transition aşamasında iletişim (Stakeholder collaboration) olarak yansıtılmıştır.'
            ]
        };

        const App = () => {
            const [projects, setProjects] = useState([]);
            const [showAddModal, setShowAddModal] = useState(false);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');

            // Firebase States
            const [user, setUser] = useState(null);
            const [isAuthLoading, setIsAuthLoading] = useState(true);
            const [isDataLoading, setIsDataLoading] = useState(true);

            // Prevent initial save on mount
            const initialLoadComplete = useRef(false);

            const [newProject, setNewProject] = useState({
                title: '',
                startDate: '',
                endDate: '',
                totalHours: 0,
                rawDuties: '',
                hoursByKA: { bapm: 0, ec: 0, rlcm: 0, sa: 0, radd: 0, se: 0 },
                description: '',
                mentorFeedback: []
            });

            // Animasyonların çalışması için küçük bir delay ekliyoruz
            const [mounted, setMounted] = useState(false);
            useEffect(() => { setMounted(true); }, []);

            // 1. Firebase Authentication (Anonymous)
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(firebaseUser => {
                    if (firebaseUser) {
                        setUser(firebaseUser);
                        setIsAuthLoading(false);
                    } else {
                        // Kulanıcı yoksa sessizce kaydet (Anonymous)
                        auth.signInAnonymously()
                            .catch(error => {
                                console.error("Firebase Anonymous Auth Error:", error);
                                alert("Veritabanı bağlantısı (Giriş) başarısız oldu. Kurulum adımlarını kontrol ediniz.");
                                setIsAuthLoading(false);
                            });
                    }
                });
                return () => unsubscribe();
            }, []);

            // 2. Fetch Data from Firestore after Auth
            useEffect(() => {
                if (!user) return;

                const fetchProjects = async () => {
                    setIsDataLoading(true);
                    try {
                        const docRef = db.collection('users').doc(user.uid);
                        const docSnap = await docRef.get();

                        if (docSnap.exists) {
                            // Var olan veriyi getir
                            const data = docSnap.data();
                            if (data.projects && Array.isArray(data.projects)) {
                                setProjects(data.projects);
                            }
                        } else {
                            // Firestore'da ilk kaydı oluştur
                            await docRef.set({ projects: [INITIAL_PROJECT], lastUpdated: firebase.firestore.FieldValue.serverTimestamp() });
                            setProjects([INITIAL_PROJECT]);
                        }
                    } catch (error) {
                        console.error("Firebase Veri Çekme Hatası:", error);
                        alert("Kayıtlı verileriniz buluttan getirilemedi. Firebase Firestore 'Kurallar' (Rules) sekmesinde Test Modu'nun açık olduğundan emin olun.");
                        // Hata durumunda en azından bir proje ile başlat ki boş kalmasın
                        setProjects([INITIAL_PROJECT]);
                    } finally {
                        setIsDataLoading(false);
                        // Data loaded, we can now start watching for saves
                        initialLoadComplete.current = true;
                    }
                };

                fetchProjects();
            }, [user]);

            // 3. Save Data to Firestore when Projects change
            useEffect(() => {
                const saveProjects = async () => {
                    if (!user || !initialLoadComplete.current) return;

                    try {
                        await db.collection('users').doc(user.uid).set({
                            projects: projects,
                            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });
                    } catch (error) {
                        console.error("Firebase Kaydetme Hatası:", error);
                    }
                };

                // Only save if data is loaded and not currently loading. Wait a brief moment to debounce rapid events if needed, but direct save is fine here.
                saveProjects();
            }, [projects, user]);

            const calculateTotals = () => {
                const totals = {
                    overall: 0,
                    ka: { bapm: 0, ec: 0, rlcm: 0, sa: 0, radd: 0, se: 0 }
                };
                projects.forEach(p => {
                    totals.overall += Number(p.totalHours);
                    Object.keys(p.hoursByKA).forEach(key => {
                        totals.ka[key] += Number(p.hoursByKA[key]);
                    });
                });
                return totals;
            };

            const totals = calculateTotals();
            const qualifyingKAs = Object.values(totals.ka).filter(h => h >= 900).length;
            const isTotalHoursMet = totals.overall >= 7500;
            const isKAMet = qualifyingKAs >= 4;
            const isEligible = isTotalHoursMet && isKAMet;

            // GEMINI API - AI Mentor Analizi İşlemi
            const handleAnalyze = async () => {
                if (!apiKey) {
                    alert("Mentor analizi için lütfen sayfanın sağ üst köşesinden Gemini API Anahtarınızı giriniz.");
                    return;
                }
                if (!newProject.title || !newProject.rawDuties || newProject.totalHours <= 0) {
                    alert("Mentor analizinin yapılabilmesi için lütfen Proje Adını, Toplam Saati ve Yaptığınız İşleri (Ham) doldurunuz.");
                    return;
                }

                setIsAnalyzing(true);

                // --- MODEL BULMA & SEÇME AŞAMASI ---
                let targetModel = "models/gemini-1.5-flash"; // Varsayılan
                try {
                    const modelsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                    if (modelsRes.ok) {
                        const modelsData = await modelsRes.json();
                        // Desteklenen ve 'generateContent' yapabilen Gemini modellerini listele
                        const availableModels = modelsData.models.filter(m =>
                            m.name.includes('gemini') &&
                            m.supportedGenerationMethods &&
                            m.supportedGenerationMethods.includes('generateContent')
                        );

                        if (availableModels.length > 0) {
                            // Öncelikli olarak 1.5 flash veya pro modellerini seçmeye çalış
                            const preferred = availableModels.find(m => m.name.includes('1.5-flash')) ||
                                availableModels.find(m => m.name.includes('1.5-pro')) ||
                                availableModels.find(m => m.name.includes('gemini-2')) ||
                                availableModels[0];

                            targetModel = preferred.name; // Örn: 'models/gemini-1.5-flash-001'
                            console.log("Seçilen ve Desteklenen Model:", targetModel);
                        }
                    }
                } catch (discoveryError) {
                    console.warn("Model listesi alınamadı, standart model deneniyor...", discoveryError);
                }

                const url = `https://generativelanguage.googleapis.com/v1beta/${targetModel}:generateContent?key=${apiKey}`;

                const promptText = `
Sen kıdemli bir CBAP mentorüsün. Adayın girdiği proje detaylarını BABOK v3 kurallarına ve IIBA Audit kriterlerine göre analiz et.
Proje Adı: ${newProject.title}
Toplam Saat: ${newProject.totalHours}
Adayın Yaptığı İşler (Ham): ${newProject.rawDuties}

Görevlerin:
1. Toplam ${newProject.totalHours} saati, adayın anlattığı işlere göre BABOK'un 6 Bilgi Alanına (bapm, ec, rlcm, sa, radd, se) adil ve uyumlu bir şekilde dağıt. Bu saatlerin tam toplamı mutlaka ${newProject.totalHours} olmalıdır.
2. Adayın anlattıklarını temel alarak, IIBA başvuru portalına doğrudan kopyalanabilecek, BABOK Action Verb'leri içeren "Audit-Proof" İNGİLİZCE bir açıklama (description) yaz. PM (Proje Yönetimi), Unit Test veya Kodlama kelimelerini BABOK terminolojisiyle değiştir.
3. Adaya bu projeyle ilgili TÜRKÇE mentor geribildirimleri ve varsa denetim (audit) risk uyarıları ver.
`;

                const payload = {
                    contents: [{ parts: [{ text: promptText }] }],
                    systemInstruction: { parts: [{ text: "Sen profesyonel bir CBAP mentorüsün. Çıktıların tamamen IIBA standartlarında olmalıdır." }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                kaDistribution: {
                                    type: "OBJECT",
                                    properties: {
                                        bapm: { type: "INTEGER" },
                                        ec: { type: "INTEGER" },
                                        rlcm: { type: "INTEGER" },
                                        sa: { type: "INTEGER" },
                                        radd: { type: "INTEGER" },
                                        se: { type: "INTEGER" }
                                    },
                                    required: ["bapm", "ec", "rlcm", "sa", "radd", "se"]
                                },
                                auditProofDescription: { type: "STRING" },
                                mentorFeedback: { type: "ARRAY", items: { type: "STRING" } }
                            },
                            required: ["kaDistribution", "auditProofDescription", "mentorFeedback"]
                        }
                    }
                };

                const fetchWithRetry = async (retries = 5) => {
                    const delays = [1000, 2000, 4000, 8000, 16000];
                    for (let i = 0; i < retries; i++) {
                        try {
                            const res = await fetch(url, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                            if (!res.ok) {
                                const errorData = await res.json().catch(() => ({}));
                                throw new Error(`HTTP error! status: ${res.status}, details: ${JSON.stringify(errorData)}`);
                            }
                            return await res.json();
                        } catch (e) {
                            if (i === retries - 1) throw e;
                            await new Promise(r => setTimeout(r, delays[i]));
                        }
                    }
                };

                try {
                    const data = await fetchWithRetry();
                    const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (resultText) {
                        const parsed = JSON.parse(resultText);
                        setNewProject(prev => ({
                            ...prev,
                            hoursByKA: parsed.kaDistribution,
                            description: parsed.auditProofDescription,
                            mentorFeedback: parsed.mentorFeedback
                        }));
                    }
                } catch (error) {
                    console.error("Mentor analizinde hata:", error);
                    alert(`Analiz sırasında bir teknik sorun oluştu:\n\nHata Detayı: ${error.message}\n\nOlası Çözümler:\n1. API Anahtarınızın doğruluğundan emin olun.\n2. Google AI Studio üzerinden faturalandırma limitlerinize takılmadığınızı kontrol edin.`);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const handleAddProject = () => {
                if (!newProject.title || newProject.totalHours === 0) return;
                setProjects([{ ...newProject, id: Date.now() }, ...projects]);
                setNewProject({
                    title: '',
                    startDate: '',
                    endDate: '',
                    totalHours: 0,
                    rawDuties: '',
                    hoursByKA: { bapm: 0, ec: 0, rlcm: 0, sa: 0, radd: 0, se: 0 },
                    description: '',
                    mentorFeedback: []
                });
                setShowAddModal(false);
            };

            const deleteProject = (id) => {
                setProjects(projects.filter(p => p.id !== id));
            };

            // Loading Ekranı
            if (isAuthLoading || isDataLoading) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <div className="text-center">
                            <IconLoader className="w-16 h-16 animate-spin text-indigo-600 mx-auto mb-4" />
                            <h2 className="text-2xl font-black text-slate-800 tracking-tight">Buluta Bağlanıyor...</h2>
                            <p className="text-slate-500 font-medium mt-2">Deneyimleriniz güvenli sunuculardan getiriliyor</p>

                            <div className="mt-8 text-[10px] font-black uppercase text-slate-400">
                                {isAuthLoading ? "Anonim Kimlik Doğrulanıyor..." : "Veritabanı Senkronize Ediliyor..."}
                            </div>
                        </div>
                    </div>
                )
            }

            return (
                <div className="min-h-screen p-4 md:p-8 text-slate-800">
                    <header className="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h1 className="text-3xl font-bold text-slate-900 flex items-center gap-2">
                                <IconTrophy /> CBAP Deneyim Skoru
                            </h1>
                            <p className="text-slate-500 mt-1 italic uppercase text-xs tracking-widest font-black">AI Destekli Mentor & Kriter Takip Paneli</p>
                        </div>
                        <div className="flex flex-col md:flex-row gap-4 items-center">
                            <input
                                type="password"
                                placeholder="Gemini API Anahtarı"
                                value={apiKey}
                                onChange={(e) => {
                                    setApiKey(e.target.value);
                                    localStorage.setItem('gemini_api_key', e.target.value);
                                }}
                                className="px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-sm shadow-sm w-full md:w-auto"
                            />
                            <button
                                onClick={() => setShowAddModal(true)}
                                className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all shadow-lg shadow-indigo-100 hover:shadow-indigo-200 whitespace-nowrap"
                            >
                                <IconPlus /> Deneyim Ekle
                            </button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto space-y-8">
                        {/* Scorecard Dashboard */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className={`col-span-1 md:col-span-3 p-8 rounded-[2.5rem] border shadow-sm flex flex-col md:flex-row items-center justify-between gap-8 transition-colors duration-500 ${isEligible ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-200'}`}>
                                <div className="flex items-center gap-6">
                                    <div className={`w-20 h-20 rounded-full flex items-center justify-center shadow-inner transition-colors duration-500 ${isEligible ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                        {isEligible ? <IconCheckCircle size={40} className="text-white" /> : <IconTarget size={40} />}
                                    </div>
                                    <div>
                                        <h2 className="text-2xl font-black text-slate-900 uppercase tracking-tight">Başvuru Uygunluk Durumu</h2>
                                        <p className={`font-bold text-lg ${isEligible ? 'text-emerald-600' : 'text-slate-400'}`}>
                                            {isEligible ? 'Tebrikler! CBAP başvurusuna hazırsınız.' : 'Kriterleri tamamlamak için veri girişi yapın.'}
                                        </p>
                                    </div>
                                </div>
                                <div className="flex gap-4 w-full md:w-auto">
                                    <div className="flex-1 md:w-40 p-5 bg-slate-50 rounded-3xl border border-slate-100 text-center">
                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Toplam Saat</p>
                                        <p className={`text-2xl font-black ${isTotalHoursMet ? 'text-emerald-600' : 'text-slate-800'}`}>{totals.overall.toLocaleString()}/7500</p>
                                    </div>
                                    <div className="flex-1 md:w-40 p-5 bg-slate-50 rounded-3xl border border-slate-100 text-center">
                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Yeterli KA (900+)</p>
                                        <p className={`text-2xl font-black ${isKAMet ? 'text-emerald-600' : 'text-slate-800'}`}>{qualifyingKAs}/4</p>
                                    </div>
                                </div>
                            </div>

                            {/* KA Skor Tablosu */}
                            <div className="md:col-span-2 bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200">
                                <h3 className="text-xl font-black mb-8 flex items-center gap-2 text-slate-900">
                                    <IconBarChart /> Bilgi Alanı (KA) Skorları
                                </h3>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    {KNOWLEDGE_AREAS.map(ka => (
                                        <div key={ka.id} className="relative p-5 rounded-3xl bg-slate-50 border border-slate-100 transition-all hover:bg-slate-100/50">
                                            <div className="flex justify-between items-start mb-3 relative z-10">
                                                <div className="max-w-[70%]">
                                                    <p className="text-[10px] font-black text-slate-400 uppercase leading-none mb-1">{ka.id}</p>
                                                    <h4 className="text-sm font-bold text-slate-800 leading-tight">{ka.name}</h4>
                                                </div>
                                                <div className="text-right">
                                                    <p className={`text-xl font-black leading-none ${totals.ka[ka.id] >= 900 ? 'text-emerald-600' : 'text-slate-900'}`}>
                                                        {totals.ka[ka.id]}
                                                    </p>
                                                    <p className="text-[10px] text-slate-400 font-black uppercase">SAAT</p>
                                                </div>
                                            </div>
                                            <div className="w-full bg-slate-200 h-2 rounded-full mt-4 overflow-hidden relative z-10 shadow-inner">
                                                <div
                                                    className={`progress-bar ${ka.color} h-full`}
                                                    style={{ width: mounted ? `${Math.min((totals.ka[ka.id] / 900) * 100, 100)}%` : '0%' }}
                                                />
                                            </div>
                                            {totals.ka[ka.id] >= 900 && (
                                                <div className="absolute top-2 right-2 opacity-10">
                                                    <IconCheckCircle size={80} className="text-emerald-600" />
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Mentor Uyarıları */}
                            <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200 space-y-6">
                                <h3 className="text-xl font-black flex items-center gap-2 text-slate-900">
                                    <IconAlert size={24} /> Audit & İpuçları
                                </h3>
                                <div className="space-y-4">
                                    {!isTotalHoursMet && (
                                        <div className="p-4 bg-amber-50 rounded-2xl border border-amber-100 flex gap-4">
                                            <div className="mt-1"><IconInfo className="text-amber-600" /></div>
                                            <div>
                                                <p className="text-xs font-black text-amber-800 uppercase mb-1">Eksik Saat</p>
                                                <p className="text-sm text-amber-900 font-medium">Başvuru için {(7500 - totals.overall).toLocaleString()} saat daha giriş yapmalısınız.</p>
                                            </div>
                                        </div>
                                    )}
                                    {!isKAMet && (
                                        <div className="p-4 bg-indigo-50 rounded-2xl border border-indigo-100 flex gap-4">
                                            <div className="mt-1"><IconTarget size={20} className="text-indigo-600" /></div>
                                            <div>
                                                <p className="text-xs font-black text-indigo-800 uppercase mb-1">KA Hedefi</p>
                                                <p className="text-sm text-indigo-900 font-medium">900 saat barajını geçen <strong>{qualifyingKAs}</strong> alanınız var. En az 4 olmalı.</p>
                                            </div>
                                        </div>
                                    )}
                                    <div className="p-4 bg-slate-50 rounded-2xl border border-slate-200 flex gap-4">
                                        <div className="mt-1"><IconCheckCircle size={20} className="text-slate-400" /></div>
                                        <div>
                                            <p className="text-xs font-black text-slate-500 uppercase mb-1">Denetim İpucu</p>
                                            <p className="text-sm text-slate-600 font-medium">Aylık ortalama iş analizi saatiniz 160-170'i geçmemelidir.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Project List */}
                        <div className="space-y-6">
                            <div className="flex items-center justify-between px-4">
                                <h2 className="text-2xl font-black flex items-center gap-3 text-slate-900 uppercase tracking-tight">
                                    <IconFileText size={28} /> Deneyim Geçmişi
                                </h2>
                                <div className="px-4 py-1.5 bg-slate-200 rounded-full text-xs font-black text-slate-600 uppercase italic">
                                    {projects.length} KAYIT BULUNDU
                                </div>
                            </div>

                            <div className="grid grid-cols-1 gap-6">
                                {projects.length === 0 ? (
                                    <div className="bg-white border-4 border-dashed border-slate-100 rounded-[3rem] p-20 text-center">
                                        <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6">
                                            <IconFileText size={48} className="text-slate-200" />
                                        </div>
                                        <h3 className="text-2xl font-black text-slate-400 uppercase">Veri Girişi Bekleniyor</h3>
                                        <p className="text-slate-400 font-medium mt-2">Projelerinizi ekleyerek uygunluk skorunuzu hesaplayın.</p>
                                    </div>
                                ) : (
                                    projects.map(project => (
                                        <div key={project.id} className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200 hover:shadow-xl hover:border-indigo-100 transition-all group">
                                            <div className="flex justify-between items-start mb-6">
                                                <div className="flex-1">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <span className="px-3 py-1 bg-indigo-600 text-white text-[10px] font-black rounded-full uppercase italic">PROJE</span>
                                                        <span className="text-sm font-black text-slate-400 uppercase tracking-widest">{project.startDate} - {project.endDate}</span>
                                                    </div>
                                                    <h3 className="text-xl font-black text-slate-900 group-hover:text-indigo-600 transition-colors leading-tight">{project.title}</h3>
                                                </div>
                                                <button onClick={() => deleteProject(project.id)} className="p-3 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-full transition-all">
                                                    <IconTrash />
                                                </button>
                                            </div>

                                            <div className="grid grid-cols-3 md:grid-cols-7 gap-2 mb-6">
                                                {KNOWLEDGE_AREAS.map(ka => project.hoursByKA[ka.id] > 0 && (
                                                    <div key={ka.id} className="text-[10px] px-3 py-2 bg-slate-50 rounded-2xl border border-slate-100">
                                                        <p className="font-black text-slate-400 uppercase leading-none mb-1 truncate">{ka.id}</p>
                                                        <p className="text-indigo-600 font-black text-sm">{project.hoursByKA[ka.id]}h</p>
                                                    </div>
                                                ))}
                                                <div className="text-[10px] px-3 py-2 bg-indigo-50 rounded-2xl border border-indigo-100">
                                                    <p className="font-black text-indigo-400 uppercase leading-none mb-1">TOTAL</p>
                                                    <p className="text-indigo-700 font-black text-sm">{project.totalHours}h</p>
                                                </div>
                                            </div>

                                            <div className="bg-slate-50 p-6 rounded-3xl text-sm text-slate-600 leading-relaxed border border-slate-100 italic font-medium relative overflow-hidden mb-4">
                                                <div className="absolute top-0 left-0 w-1 h-full bg-slate-300"></div>
                                                {project.description}
                                            </div>

                                            {/* Project Specific Mentor Feedback Display */}
                                            {project.mentorFeedback && project.mentorFeedback.length > 0 && (
                                                <div className="p-4 bg-amber-50/50 border border-amber-100/50 rounded-2xl">
                                                    <h4 className="text-[10px] font-black text-amber-700 uppercase mb-2 flex items-center gap-1"><IconAlert size={14} /> Projeye Özel Mentor Yorumları</h4>
                                                    <ul className="text-xs text-amber-900 space-y-1 list-disc pl-4 font-medium">
                                                        {project.mentorFeedback.map((fb, idx) => <li key={idx}>{fb}</li>)}
                                                    </ul>
                                                </div>
                                            )}
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </main>

                    {/* Add Project & Mentor AI Modal */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="modal-enter bg-white rounded-[3rem] w-full max-w-3xl max-h-[90vh] overflow-y-auto shadow-2xl">
                                <div className="p-8 border-b border-slate-50 flex justify-between items-center sticky top-0 bg-white z-10">
                                    <div>
                                        <h2 className="text-3xl font-black text-slate-900 tracking-tight flex items-center gap-2">
                                            YENİ DENEYİM & MENTOR
                                        </h2>
                                    </div>
                                    <button onClick={() => setShowAddModal(false)} className="p-2 text-slate-400 hover:bg-slate-100 rounded-full transition-colors">
                                        <IconChevronDown />
                                    </button>
                                </div>

                                <div className="p-8 space-y-10">

                                    {/* Step 1: User Raw Inputs */}
                                    <div className="space-y-6">
                                        <div className="flex items-center gap-2 text-indigo-600 border-b border-indigo-100 pb-2">
                                            <span className="w-6 h-6 rounded-full bg-indigo-100 text-xs font-black flex items-center justify-center">1</span>
                                            <h3 className="font-black text-sm uppercase tracking-widest">Temel Proje Bilgilerinizi Girin</h3>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="md:col-span-2">
                                                <label className="block text-xs font-black text-slate-400 uppercase mb-3 tracking-widest italic">Proje / İş Tanımı</label>
                                                <input
                                                    className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none font-bold text-lg"
                                                    placeholder="Örn: Mobil Uygulama Kredi Modülü"
                                                    value={newProject.title}
                                                    onChange={e => setNewProject({ ...newProject, title: e.target.value })}
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-black text-slate-400 uppercase mb-3 tracking-widest italic">Başlangıç (Örn: 2023-01)</label>
                                                <input type="month" className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold text-slate-700" value={newProject.startDate} onChange={e => setNewProject({ ...newProject, startDate: e.target.value })} />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-black text-slate-400 uppercase mb-3 tracking-widest italic">Bitiş (Örn: 2023-06)</label>
                                                <input type="month" className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold text-slate-700" value={newProject.endDate} onChange={e => setNewProject({ ...newProject, endDate: e.target.value })} />
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className="block text-xs font-black text-slate-400 uppercase mb-3 tracking-widest italic">Projeye Harcadığınız TOPLAM Süre (Saat)</label>
                                                <input type="number" className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-black text-indigo-600 text-xl" placeholder="Örn: 200" value={newProject.totalHours || ''} onChange={e => setNewProject({ ...newProject, totalHours: Number(e.target.value) })} />
                                            </div>
                                        </div>

                                        <div className="md:col-span-2">
                                            <label className="block text-xs font-black text-slate-400 uppercase mb-3 tracking-widest italic">Sorumluluklarım / Yaptığım İşler (Ham Metin)</label>
                                            <textarea
                                                className="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-3xl min-h-[120px] outline-none text-sm font-bold text-slate-700 leading-relaxed focus:border-indigo-500"
                                                placeholder="Buraya ne yaptıysanız düz cümlelerle Türkçe veya İngilizce anlatın. (Örn: Süreçleri çizdim, test ekipleriyle toplantı yaptım, ekranları tasarladım...)"
                                                value={newProject.rawDuties}
                                                onChange={e => setNewProject({ ...newProject, rawDuties: e.target.value })}
                                            ></textarea>
                                        </div>

                                        <button
                                            onClick={handleAnalyze}
                                            disabled={isAnalyzing || !newProject.rawDuties || !newProject.title}
                                            className="w-full flex items-center justify-center gap-3 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 disabled:opacity-50 text-white py-5 rounded-3xl font-black text-lg shadow-xl shadow-indigo-200 transition-all active:scale-[0.98] uppercase tracking-widest"
                                        >
                                            {isAnalyzing ? <IconLoader /> : <IconWand />}
                                            {isAnalyzing ? 'YAPAY ZEKA MENTOR ANALİZ EDİYOR...' : 'YAPAY ZEKA MENTOR ANALİZİ İSTE'}
                                        </button>
                                    </div>

                                    {/* Step 2: AI Output & Editing */}
                                    <div className={`space-y-6 transition-opacity duration-500 ${newProject.description ? 'opacity-100 block' : 'opacity-30 pointer-events-none'}`}>
                                        <div className="flex items-center gap-2 text-emerald-600 border-b border-emerald-100 pb-2 mt-8">
                                            <span className="w-6 h-6 rounded-full bg-emerald-100 text-xs font-black flex items-center justify-center">2</span>
                                            <h3 className="font-black text-sm uppercase tracking-widest">Mentor Tarafından Optimizasyon Sonucu</h3>
                                        </div>

                                        <div className="p-8 bg-slate-50 rounded-[2.5rem] border border-slate-200 shadow-inner">
                                            <h4 className="text-xs font-black text-slate-400 mb-8 uppercase tracking-widest text-center italic">Yapay Zekanın Otomatik Saat Dağıtımı (KAs)</h4>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-6">
                                                {KNOWLEDGE_AREAS.map(ka => (
                                                    <div key={ka.id} className="flex items-center justify-between group">
                                                        <span className="text-[10px] font-black text-slate-600 uppercase group-hover:text-indigo-600 transition-colors">{ka.name}</span>
                                                        <input
                                                            type="number"
                                                            min="0"
                                                            className="w-20 px-3 py-2 bg-white border border-slate-200 rounded-xl text-right font-black text-indigo-600 outline-none focus:border-indigo-500 shadow-sm text-base"
                                                            value={newProject.hoursByKA[ka.id] || 0}
                                                            onChange={e => {
                                                                const val = e.target.value === '' ? 0 : Number(e.target.value);
                                                                const updatedKA = { ...newProject.hoursByKA, [ka.id]: val };
                                                                // Total saati dağıtıma göre güncelle
                                                                const newTotal = Object.values(updatedKA).reduce((a, b) => a + b, 0);
                                                                setNewProject({
                                                                    ...newProject,
                                                                    hoursByKA: updatedKA,
                                                                    totalHours: newTotal
                                                                });
                                                            }}
                                                        />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        {newProject.mentorFeedback && newProject.mentorFeedback.length > 0 && (
                                            <div className="p-6 bg-amber-50 rounded-[2rem] border border-amber-200">
                                                <h4 className="text-xs font-black text-amber-800 uppercase mb-3 flex items-center gap-2"><IconAlert size={18} /> Mentorun Denetim (Audit) Uyarıları</h4>
                                                <ul className="text-sm text-amber-900 space-y-2 list-disc pl-5 font-medium">
                                                    {newProject.mentorFeedback.map((fb, idx) => <li key={idx}>{fb}</li>)}
                                                </ul>
                                            </div>
                                        )}

                                        <div>
                                            <label className="block text-xs font-black text-slate-400 uppercase mb-3 tracking-widest italic">Uygulamaya Kopyalanacak Audit-Proof Açıklama (İngilizce)</label>
                                            <textarea
                                                className="w-full px-6 py-5 bg-white border-2 border-emerald-200 rounded-3xl min-h-[160px] outline-none text-sm font-bold text-slate-700 leading-relaxed shadow-sm focus:border-emerald-500"
                                                value={newProject.description}
                                                onChange={e => setNewProject({ ...newProject, description: e.target.value })}
                                            ></textarea>
                                        </div>

                                        <button
                                            onClick={handleAddProject}
                                            disabled={!newProject.title || newProject.totalHours === 0 || !newProject.description}
                                            className="w-full bg-slate-900 hover:bg-slate-800 disabled:bg-slate-200 disabled:text-slate-400 text-white py-6 rounded-3xl font-black text-xl shadow-2xl transition-all active:scale-[0.98] uppercase tracking-widest mt-8"
                                        >
                                            BU PROJEYİ KAYITLARA EKLE
                                        </button>
                                    </div>

                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
